<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeWizard P1 Power Chart</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232a5298'/%3E%3Cpath d='M12 42h40M12 42V16M18 34l9-9 8 7 12-15' fill='none' stroke='white' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <!-- Annotation plugin handled inline -->
    <!-- Socket.IO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(0,0,0,0.8);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            flex: 0 0 auto;
            border-bottom: 2px solid #333;
        }

        .header-brand {
            flex: 0 0 auto;
            min-width: 250px;
        }
        
        .header h1 {
            font-size: 1.5rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: flex-end;
            flex: 1 1 900px;
            flex-wrap: wrap;
            min-width: 0;
        }
        
        .time-selector {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .time-selector label {
            color: #ccc;
            font-size: 0.9rem;
        }
        
        .time-selector input, .time-selector select {
            padding: 0.5rem;
            border: 1px solid #555;
            border-radius: 4px;
            background: #333;
            color: #fff;
            font-size: 0.9rem;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.3s;
            white-space: nowrap;
        }
        
        .btn-primary {
            background: #2a5298;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1e3c72;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #545b62;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .chart-container {
            flex: 1 1 auto;
            min-height: 0;
            height: auto;
            position: relative;
            padding: 1rem;
        }
        
        #powerChart {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }

        .chart-tooltip {
            position: absolute;
            display: none;
            pointer-events: none;
            z-index: 30;
            min-width: 280px;
            max-width: min(420px, calc(100vw - 48px));
            padding: 0.75rem 0.85rem;
            border: 1px solid #3498db;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.88);
            color: #fff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
            font-size: 0.88rem;
            line-height: 1.25;
        }

        .chart-tooltip-title {
            margin-bottom: 0.45rem;
            font-weight: 700;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .chart-tooltip-row {
            display: grid;
            grid-template-columns: 14px minmax(0, 1fr) auto;
            gap: 0.45rem;
            align-items: baseline;
            margin-top: 0.18rem;
            margin-left: -0.35rem;
            margin-right: -0.35rem;
            padding: 0.08rem 0.35rem;
            border-radius: 5px;
        }

        .chart-tooltip-row.hovered {
            background: color-mix(in srgb, var(--tooltip-color, #fff) 22%, rgba(255,255,255,0.08));
            box-shadow: inset 3px 0 0 var(--tooltip-color, #fff);
        }

        .chart-tooltip-swatch {
            width: 12px;
            height: 12px;
            border: 2px solid var(--tooltip-color, #fff);
            background: color-mix(in srgb, var(--tooltip-color, #fff) 35%, transparent);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.25);
        }

        .chart-tooltip-label {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 650;
        }

        .chart-tooltip-value {
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            font-weight: 700;
        }

        .chart-tooltip-row.hovered .chart-tooltip-label,
        .chart-tooltip-row.hovered .chart-tooltip-value {
            font-weight: 850;
            color: #fff;
        }

        .chart-tooltip-detail {
            grid-column: 2 / 4;
            margin-top: -0.08rem;
            color: #cfd8dc;
            font-size: 0.78rem;
        }
        
        .marker-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
        }
        
        .marker-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .marker-form {
            background: #333;
            padding: 2rem;
            border-radius: 8px;
            width: 400px;
            max-width: 90%;
        }
        
        .marker-form h3 {
            margin-bottom: 1rem;
            color: #fff;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ccc;
        }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #555;
            border-radius: 4px;
            background: #222;
            color: #fff;
            font-family: inherit;
        }
        
        .form-group textarea {
            resize: vertical;
            height: 80px;
        }
        
        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }
        
        .status {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            margin-top: 0.4rem;
            font-size: 0.9rem;
        }
        
        .status.connected {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }
        
        .status.disconnected {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }
        
        .marker-legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 1rem;
            border-radius: 8px;
            min-width: 200px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .marker-legend h4 {
            color: #fff;
            margin-bottom: 0.5rem;
        }
        
        .marker-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.35rem;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.12s ease;
        }
        
        .marker-item:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }
        
        .marker-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
        
        .marker-text {
            flex: 1;
            color: #ccc;
        }
        
        .marker-delete {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            padding: 0;
            font-size: 0.8rem;
        }
        
        .quick-periods {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        @media (max-width: 900px) {
            body {
                overflow-y: auto;
            }

            .header {
                align-items: flex-start;
            }

            .header-brand {
                min-width: 0;
                width: 100%;
            }

            .header h1 {
                white-space: normal;
            }

            .controls {
                justify-content: flex-start;
                flex-basis: 100%;
            }

            .time-selector input {
                width: min(100%, 240px);
            }

            .chart-container {
                min-height: 70vh;
            }
        }
        
        .quick-period {
            padding: 0.25rem 0.5rem;
            background: #444;
            border: 1px solid #666;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #ccc;
            transition: all 0.3s;
        }
        
        .quick-period.active {
            background: #2a5298;
            color: #fff;
            border-color: #2a5298;
        }
        
        .quick-period:hover {
            background: #555;
        }

        .range-summary-panel {
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: min(380px, calc(100% - 40px));
            background: rgba(0, 0, 0, 0.82);
            border: 1px solid rgba(52, 152, 219, 0.35);
            border-radius: 10px;
            padding: 0.9rem 1rem;
            backdrop-filter: blur(6px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .range-summary-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.65rem;
        }

        .range-summary-header h4 {
            margin: 0;
            color: #fff;
            font-size: 0.95rem;
        }

        .btn-compact {
            padding: 0.25rem 0.55rem;
            font-size: 0.75rem;
        }

        .range-summary-empty,
        .range-summary-note,
        .range-summary-error {
            color: #b8c7d7;
            font-size: 0.82rem;
            line-height: 1.45;
        }

        .range-summary-error {
            color: #ff9f8f;
        }

        .range-summary-times {
            color: #fff;
            font-size: 0.84rem;
            line-height: 1.4;
            margin-bottom: 0.7rem;
        }

        .range-summary-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.55rem;
            margin-bottom: 0.7rem;
        }

        .range-summary-stat {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 0.55rem 0.65rem;
        }

        .range-summary-value {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
        }

        .range-summary-label {
            color: #9fb3c8;
            font-size: 0.72rem;
            margin-top: 0.18rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-brand">
            <h1><i class="fas fa-chart-line"></i> Power History Chart</h1>
            <span class="status" id="status">Connecting...</span>
        </div>
        <div class="controls">
            <div class="quick-periods">
                <span class="quick-period" data-hours="1">1H</span>
                <span class="quick-period" data-hours="6">6H</span>
                <span class="quick-period active" data-hours="24">24H</span>
                <span class="quick-period" data-hours="168">1W</span>
                <span class="quick-period" data-hours="720">1M</span>
            </div>
            
            <div class="time-selector">
                <label for="startTime">From:</label>
                <input type="datetime-local" id="startTime">
                <label for="endTime">To:</label>
                <input type="datetime-local" id="endTime">
                <button class="btn btn-primary" onclick="updateCustomRange()">
                    <i class="fas fa-search"></i> Load
                </button>
            </div>
            
            <button class="btn btn-secondary" onclick="toggleSpotPrice()" id="spotPriceBtn" title="Toggle spot price overlay">
                <i class="fas fa-euro-sign"></i> Price
            </button>

            <button class="btn btn-secondary" onclick="togglePlugs()" id="plugsBtn" title="Stack smart plug consumption under the P1 total">
                <i class="fas fa-plug"></i> Plugs
            </button>

            <button class="btn btn-secondary" onclick="toggleIlpPower()" id="ilpPowerBtn" title="Overlay hourly ILP power. Yläkerta is included in this P1 meter; Iso huone is outside it.">
                <i class="fas fa-fan"></i> ILP
            </button>

            <button class="btn btn-secondary" onclick="addMarker()" id="addMarkerBtn">
                <i class="fas fa-map-marker-alt"></i> Add Marker
            </button>

            <button class="btn btn-secondary" onclick="window.location.href='/vendors'">
                <i class="fas fa-solar-panel"></i> Vendors
            </button>

            <button class="btn btn-secondary" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> Back
            </button>
        </div>
    </header>

    <main class="chart-container">
        <canvas id="powerChart"></canvas>
        
        <div class="marker-legend" id="markerLegend">
            <h4>Markers</h4>
            <div id="markerList">
                <div class="marker-text" style="color: #666; font-style: italic;">No markers</div>
            </div>
        </div>

        <div class="range-summary-panel" id="rangeSummaryPanel">
            <div class="range-summary-header">
                <h4>Selected Range</h4>
                <button class="btn btn-secondary btn-compact" id="clearRangeSelectionBtn" onclick="clearRangeSelection()" style="display: none;">Clear</button>
            </div>
            <div id="rangeSummaryBody" class="range-summary-empty">
                Drag across the chart to measure energy and cost for any span. Click without dragging still adds a marker.
            </div>
        </div>
    </main>

    <!-- Marker Modal -->
    <div class="marker-modal" id="markerModal">
        <div class="marker-form">
            <h3>Add Chart Marker</h3>
            <div class="form-group">
                <label>Time:</label>
                <input type="text" id="markerTime" readonly>
            </div>
            <div class="form-group">
                <label>Label:</label>
                <input type="text" id="markerLabel" placeholder="e.g., Pool heater off">
            </div>
            <div class="form-group">
                <label>Description:</label>
                <textarea id="markerDescription" placeholder="Optional detailed description..."></textarea>
            </div>
            <div class="form-group">
                <label>Color:</label>
                <input type="color" id="markerColor" value="#ff6b6b">
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeMarkerModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveMarker()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let socket;
        let powerChart;
        let currentMarkers = [];
        let highlightedMarkerId = null;
        let selectedTimestamp = null;
        let currentTimeRange = { hours: 24 };
        let viewWindowMs = null;       // { start, end } in ms – active when panning
        let panFetchTimer = null;      // debounce for refetching data after pan
        let showSpotPrice = localStorage.getItem('showSpotPrice') !== '0';
        let currentSpotSeries = [];
        const SPOT_PRICE_LABEL = 'Spot price (c/kWh)';
        let showPlugs = localStorage.getItem('showPlugs') !== '0';
        let currentBreakdown = null;
        let showIlpPower = localStorage.getItem('showIlpPower') !== '0';
        let currentIlpPowerSeries = [];
        let tooltipCursorMs = null;
        let hoveredDatasetIndex = null;
        const PLUG_STACK_ID = 'consumption';
        const UNACCOUNTED_LABEL = 'Unaccounted';
        const ILP_DATASET_PREFIX = 'ILP hourly avg:';
        const INVOICE_ESTIMATE_LABEL = 'Invoice estimate (W)';
        const TOOLTIP_CARRIER_LABEL = '__tooltip_rows__';
        const RANGE_SELECTION_MIN_PIXELS = 12;
        // Stable palette for plug stacks
        const PLUG_COLORS = [
            '#2ecc71', '#9b59b6', '#1abc9c', '#e67e22', '#3498db',
            '#e91e63', '#00bcd4', '#8bc34a', '#ff9800', '#607d8b'
        ];
        let selectedRange = {
            startMs: null,
            endMs: null,
            dragStartPx: null,
            dragCurrentPx: null,
            dragActive: false,
            loading: false,
            error: '',
            summary: null,
            suppressNextClick: false
        };
        let rangeSummaryRequestId = 0;
        const rangeSelectionPlugin = {
            id: 'rangeSelectionOverlay',
            afterDatasetsDraw(chart) {
                drawSelectedRangeOverlay(chart);
            }
        };
        const hoverLegendHighlightPlugin = {
            id: 'hoverLegendHighlight',
            afterDraw(chart) {
                if (hoveredDatasetIndex == null || !chart.legend) return;
                const legend = chart.legend;
                const itemIndex = (legend.legendItems || []).findIndex(item => item.datasetIndex === hoveredDatasetIndex);
                const hitBox = itemIndex >= 0 ? (legend.legendHitBoxes || [])[itemIndex] : null;
                if (!hitBox) return;

                const ds = chart.data.datasets[hoveredDatasetIndex] || {};
                const color = ds.borderColor || ds.backgroundColor || '#fff';
                const ctx = chart.ctx;
                const padX = 7;
                const padY = 4;
                const x = hitBox.left - padX;
                const y = hitBox.top - padY;
                const width = hitBox.width + padX * 2;
                const height = hitBox.height + padY * 2;

                ctx.save();
                ctx.globalCompositeOperation = 'destination-over';
                ctx.fillStyle = colorToRgba(color, 0.2);
                drawRoundedRect(ctx, x, y, width, height, 7);
                ctx.fill();
                ctx.restore();

                ctx.save();
                ctx.strokeStyle = colorToRgba(color, 0.85);
                ctx.lineWidth = 1.5;
                drawRoundedRect(ctx, x, y, width, height, 7);
                ctx.stroke();
                ctx.restore();
            }
        };
        Chart.register(rangeSelectionPlugin, hoverLegendHighlightPlugin);

        if (Chart.Tooltip && Chart.Tooltip.positioners) {
            Chart.Tooltip.positioners.cursorOffset = function(_elements, eventPosition) {
                const verticalOffset = 14;
                const width = this.chart && this.chart.width ? this.chart.width : Infinity;
                const height = this.chart && this.chart.height ? this.chart.height : Infinity;
                return {
                    x: Math.max(0, Math.min(eventPosition.x, width)),
                    y: Math.min(eventPosition.y + verticalOffset, height - verticalOffset)
                };
            };
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeSocket();
            initializeChart();
            setupTimeControls();
            updateSpotPriceButton();
            updatePlugsButton();
            updateIlpPowerButton();
            loadData();
        });

        function formatChartTimestamp(value) {
            if (!value) return '';
            const date = value instanceof Date ? value : new Date(value);
            return date.toLocaleString([], {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function formatPowerTooltipLabel(ds, value) {
            const rounded = Math.round(value).toLocaleString();
            if (!ds || !ds.label) return `${rounded}W`;
            if (ds.label === 'Total Power (W)') return `Whole house (P1): ${rounded}W`;
            if (ds.invoiceEstimateSeries) return `Invoice estimate: ${rounded}W`;
            if (ds.label === UNACCOUNTED_LABEL) return `Unaccounted: ${rounded}W`;
            if (ds.ilpSeries) return `${ds.label.replace(ILP_DATASET_PREFIX + ' ', '')}: ${rounded}W avg`;
            return `${ds.label}: ${rounded}W`;
        }

        function datasetTooltipPriority(ds) {
            if (!ds) return 100;
            if (ds.tooltipCarrier) return 98;
            if (ds.label === 'Markers') return 99;
            if (ds.mainPowerSeries || ds.label === 'Total Power (W)') return 0;
            if (ds.invoiceEstimateSeries) return 1;
            if (ds.label === SPOT_PRICE_LABEL) return 2;
            if (ds.ilpSeries) return 3;
            if (ds.stack === PLUG_STACK_ID && ds.label !== UNACCOUNTED_LABEL) return 4;
            if (ds.label === UNACCOUNTED_LABEL) return 5;
            return 20;
        }

        function pointTimeMs(point) {
            if (!point || point.x == null) return NaN;
            const value = point.x instanceof Date ? point.x.getTime() : new Date(point.x).getTime();
            return Number.isFinite(value) ? value : NaN;
        }

        function findSampleAtTime(points, targetMs, stepped) {
            if (!Array.isArray(points) || !points.length || !Number.isFinite(targetMs)) return null;
            if (stepped) {
                let best = null;
                for (const point of points) {
                    const t = pointTimeMs(point);
                    if (!Number.isFinite(t)) continue;
                    if (t <= targetMs) best = point;
                    if (t > targetMs) break;
                }
                return best && best.y != null ? best : null;
            }

            let best = null;
            let bestDiff = Infinity;
            for (const point of points) {
                if (!point || point.y == null) continue;
                const t = pointTimeMs(point);
                if (!Number.isFinite(t)) continue;
                const diff = Math.abs(t - targetMs);
                if (diff < bestDiff) {
                    bestDiff = diff;
                    best = point;
                }
            }

            const xScale = powerChart && powerChart.scales && powerChart.scales.x;
            const maxMs = xScale ? Math.abs(xScale.getValueForPixel(xScale.left + 8) - xScale.getValueForPixel(xScale.left)) : 5 * 60 * 1000;
            return best && bestDiff <= Math.max(maxMs, 5 * 60 * 1000) ? best : null;
        }

        function completeTooltipRows() {
            if (!powerChart || !Number.isFinite(tooltipCursorMs)) return [];
            return powerChart.data.datasets
                .map((ds, datasetIndex) => {
                    if (!ds || ds.hidden || ds.tooltipCarrier || ds.label === 'Markers') return null;
                    const sample = findSampleAtTime(ds.data, tooltipCursorMs, !!ds.stepped);
                    if (!sample || sample.y == null) return null;
                    return {
                        dataset: ds,
                        datasetIndex,
                        sample,
                        value: Number(sample.y),
                        priority: datasetTooltipPriority(ds)
                    };
                })
                .filter(Boolean)
                .sort((a, b) => a.priority - b.priority || a.datasetIndex - b.datasetIndex);
        }

        function tooltipLabelForRow(row) {
            const ds = row.dataset || {};
            if (ds.label === SPOT_PRICE_LABEL) {
                return `Spot: ${row.value.toFixed(2)} c/kWh`;
            }
            return formatPowerTooltipLabel(ds, row.value);
        }

        function tooltipPartsForRow(row) {
            const ds = row.dataset || {};
            if (ds.label === SPOT_PRICE_LABEL) {
                return { label: 'Spot', value: `${row.value.toFixed(2)} c/kWh` };
            }
            const value = Math.round(row.value).toLocaleString();
            if (ds.label === 'Total Power (W)') return { label: 'Whole house (P1)', value: `${value}W` };
            if (ds.invoiceEstimateSeries) return { label: 'Invoice estimate', value: `${value}W` };
            if (ds.label === UNACCOUNTED_LABEL) return { label: 'Unaccounted', value: `${value}W` };
            if (ds.ilpSeries) {
                return { label: ds.label.replace(ILP_DATASET_PREFIX + ' ', ''), value: `${value}W avg` };
            }
            return { label: ds.label || 'Series', value: `${value}W` };
        }

        function tooltipColorForRow(row) {
            const ds = row.dataset || {};
            return ds.borderColor || ds.backgroundColor || '#fff';
        }

        function colorToRgba(color, alpha) {
            if (!color) return `rgba(255, 255, 255, ${alpha})`;
            const hexMatch = String(color).trim().match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);
            if (hexMatch) {
                let h = hexMatch[1];
                if (h.length === 3) h = h.split('').map(ch => ch + ch).join('');
                const r = parseInt(h.slice(0, 2), 16);
                const g = parseInt(h.slice(2, 4), 16);
                const b = parseInt(h.slice(4, 6), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }

            const rgbMatch = String(color).match(/rgba?\(([^)]+)\)/i);
            if (rgbMatch) {
                const parts = rgbMatch[1].split(',').map(part => Number.parseFloat(part.trim()));
                if (parts.length >= 3 && parts.slice(0, 3).every(Number.isFinite)) {
                    return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${alpha})`;
                }
            }

            return color;
        }

        function drawRoundedRect(ctx, x, y, width, height, radius) {
            const r = Math.min(radius, width / 2, height / 2);
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + width - r, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + r);
            ctx.lineTo(x + width, y + height - r);
            ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
            ctx.lineTo(x + r, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function captureHoverBaseStyle(ds) {
            if (!ds || ds.tooltipCarrier || ds.label === 'Markers') return;
            if (!Object.prototype.hasOwnProperty.call(ds, '_hoverBaseBorderWidth')) {
                ds._hoverBaseBorderWidth = ds.borderWidth;
            }
            if (!Object.prototype.hasOwnProperty.call(ds, '_hoverBasePointRadius')) {
                ds._hoverBasePointRadius = ds.pointRadius;
            }
            if (!Object.prototype.hasOwnProperty.call(ds, '_hoverBasePointHoverRadius')) {
                ds._hoverBasePointHoverRadius = ds.pointHoverRadius;
            }
        }

        function restoreHoverBaseStyle(ds) {
            if (!ds) return;
            if (Object.prototype.hasOwnProperty.call(ds, '_hoverBaseBorderWidth')) {
                ds.borderWidth = ds._hoverBaseBorderWidth;
            }
            if (Object.prototype.hasOwnProperty.call(ds, '_hoverBasePointRadius')) {
                ds.pointRadius = ds._hoverBasePointRadius;
            }
            if (Object.prototype.hasOwnProperty.call(ds, '_hoverBasePointHoverRadius')) {
                ds.pointHoverRadius = ds._hoverBasePointHoverRadius;
            }
        }

        function bumpNumericStyle(value, fallback, bump, minimum) {
            if (typeof value === 'number') return Math.max(value + bump, minimum);
            return Math.max(fallback + bump, minimum);
        }

        function applyDatasetHoverStyles() {
            if (!powerChart) return;
            powerChart.data.datasets.forEach((ds, datasetIndex) => {
                if (!ds || ds.tooltipCarrier || ds.label === 'Markers') return;
                captureHoverBaseStyle(ds);
                restoreHoverBaseStyle(ds);
                if (datasetIndex !== hoveredDatasetIndex) return;

                ds.borderWidth = bumpNumericStyle(ds._hoverBaseBorderWidth, 2, 2.4, 3.5);
                ds.pointRadius = bumpNumericStyle(ds._hoverBasePointRadius, 0, 1.5, 2);
                ds.pointHoverRadius = bumpNumericStyle(ds._hoverBasePointHoverRadius, 4, 2, 6);
            });
        }

        function setHoveredDatasetIndex(datasetIndex) {
            const nextIndex = Number.isInteger(datasetIndex) ? datasetIndex : null;
            if (hoveredDatasetIndex === nextIndex) return false;
            hoveredDatasetIndex = nextIndex;
            applyDatasetHoverStyles();
            return true;
        }

        function findHoveredDatasetIndex(rows, canvasY) {
            if (!powerChart || !rows.length || !Number.isFinite(canvasY)) return null;
            const thresholdPx = 26;
            let best = null;

            rows.forEach(row => {
                const ds = row.dataset || {};
                const scaleId = ds.yAxisID || 'y';
                const yScale = powerChart.scales && powerChart.scales[scaleId];
                if (!yScale || !Number.isFinite(row.value)) return;

                const y = yScale.getPixelForValue(row.value);
                if (!Number.isFinite(y)) return;
                const distance = Math.abs(canvasY - y);
                const sameVisualBand = best && Math.abs(distance - best.distance) <= 8;
                if (!best || distance < best.distance - 8 || (sameVisualBand && row.priority < best.priority)) {
                    best = { datasetIndex: row.datasetIndex, distance, priority: row.priority };
                }
            });

            return best && best.distance <= thresholdPx ? best.datasetIndex : null;
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function tooltipAfterLabelForRow(row) {
            const ds = row.dataset || {};
            const sample = row.sample || {};
            if (ds.invoiceEstimateSeries && sample.invoiceNumber) {
                const seller = sample.sellerName ? ` (${sample.sellerName})` : '';
                return `Estimated from invoice ${sample.invoiceNumber}${seller}`;
            }
            if (ds.ilpSeries && sample.coveragePercent != null) {
                const suffix = sample.partial ? ' (partial hour)' : '';
                return `Coverage: ${Number(sample.coveragePercent).toFixed(1)}%${suffix}`;
            }
            return '';
        }

        function getTooltipCarrierDatasetIndex() {
            return powerChart
                ? powerChart.data.datasets.findIndex(ds => ds && ds.tooltipCarrier)
                : -1;
        }

        function syncTooltipCarrier(cursorMs) {
            if (!powerChart || !Number.isFinite(cursorMs)) return;
            tooltipCursorMs = cursorMs;
            const rows = completeTooltipRows();
            const carrierIndex = getTooltipCarrierDatasetIndex();
            if (carrierIndex < 0) return;
            const carrier = powerChart.data.datasets[carrierIndex];
            const fallbackY = rows.length ? rows[0].value : 0;
            carrier.data = rows.map((_row, index) => ({
                x: new Date(cursorMs),
                y: fallbackY,
                tooltipRowIndex: index
            }));
        }

        function getChartTooltipElement() {
            const container = document.querySelector('.chart-container');
            if (!container) return null;
            let el = container.querySelector('.chart-tooltip');
            if (!el) {
                el = document.createElement('div');
                el.className = 'chart-tooltip';
                container.appendChild(el);
            }
            return el;
        }

        function hideCompleteTooltip() {
            const el = getChartTooltipElement();
            if (el) {
                el.style.display = 'none';
                el.querySelectorAll('.chart-tooltip-row.hovered').forEach(row => {
                    row.classList.remove('hovered');
                });
            }
            if (!powerChart) return;
            setHoveredDatasetIndex(null);
            const carrierIndex = getTooltipCarrierDatasetIndex();
            if (carrierIndex >= 0) powerChart.data.datasets[carrierIndex].data = [];
            powerChart.tooltip.setActiveElements([], { x: 0, y: 0 });
            powerChart.draw();
        }

        function renderCompleteTooltip(canvasX, canvasY) {
            const el = getChartTooltipElement();
            if (!el || !powerChart || !Number.isFinite(tooltipCursorMs)) return;
            const rows = completeTooltipRows();
            if (!rows.length) {
                hideCompleteTooltip();
                return;
            }

            const title = formatChartTimestamp(new Date(tooltipCursorMs));
            const rowHtml = rows.map(row => {
                const parts = tooltipPartsForRow(row);
                const detail = tooltipAfterLabelForRow(row);
                const detailLines = Array.isArray(detail) ? detail : (detail ? [detail] : []);
                const color = tooltipColorForRow(row);
                const rowClass = row.datasetIndex === hoveredDatasetIndex
                    ? 'chart-tooltip-row hovered'
                    : 'chart-tooltip-row';
                return `
                    <div class="${rowClass}" style="--tooltip-color:${escapeHtml(color)}">
                        <span class="chart-tooltip-swatch"></span>
                        <span class="chart-tooltip-label">${escapeHtml(parts.label)}</span>
                        <span class="chart-tooltip-value">${escapeHtml(parts.value)}</span>
                        ${detailLines.map(line => `<span class="chart-tooltip-detail">${escapeHtml(line)}</span>`).join('')}
                    </div>
                `;
            }).join('');

            el.innerHTML = `<div class="chart-tooltip-title">${escapeHtml(title)}</div>${rowHtml}`;
            el.style.display = 'block';

            const container = document.querySelector('.chart-container');
            const pad = 12;
            const offset = 14;
            const maxLeft = Math.max(pad, container.clientWidth - el.offsetWidth - pad);
            const maxTop = Math.max(pad, container.clientHeight - el.offsetHeight - pad);
            let left = canvasX + offset;
            let top = canvasY + offset;
            if (left > maxLeft) left = canvasX - el.offsetWidth - offset;
            if (top > maxTop) top = canvasY - el.offsetHeight - offset;
            el.style.left = `${Math.max(pad, Math.min(left, maxLeft))}px`;
            el.style.top = `${Math.max(pad, Math.min(top, maxTop))}px`;
        }

        function getChartDataset(label) {
            return powerChart && powerChart.data.datasets.find(ds => ds.label === label);
        }

        function splitHistorySeries(data) {
            const measuredPoints = [];
            const estimatedPoints = [];
            let lastEstimateSegmentId = null;

            data.forEach(point => {
                const entry = {
                    x: new Date(point.datetime),
                    y: point.total_power_w,
                    estimated: !!point.estimated,
                    invoiceId: point.invoice_id,
                    invoiceNumber: point.invoice_number,
                    sellerName: point.seller_name,
                    estimateSegmentId: point.estimate_segment_id
                };

                if (point.estimated) {
                    if (lastEstimateSegmentId !== null && point.estimate_segment_id !== lastEstimateSegmentId) {
                        estimatedPoints.push({ x: entry.x, y: null });
                    }
                    estimatedPoints.push(entry);
                    lastEstimateSegmentId = point.estimate_segment_id || lastEstimateSegmentId;
                } else {
                    measuredPoints.push(entry);
                    lastEstimateSegmentId = null;
                }
            });

            return { measuredPoints, estimatedPoints };
        }

        function formatRangeDuration(seconds) {
            const totalSeconds = Math.max(0, Math.round(seconds || 0));
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const secs = totalSeconds % 60;
            if (hours > 0) return `${hours}h ${minutes}m`;
            if (minutes > 0) return `${minutes}m ${secs}s`;
            return `${secs}s`;
        }

        function formatEnergyKwh(value) {
            return `${(value || 0).toFixed(2)} kWh`;
        }

        function formatMoney(value) {
            return `€${(value || 0).toFixed(2)}`;
        }

        function formatPowerValue(value) {
            return `${Math.round(value || 0).toLocaleString()} W`;
        }

        function clampSelectionPx(x) {
            const area = powerChart && powerChart.chartArea;
            if (!area) return x;
            return Math.max(area.left, Math.min(area.right, x));
        }

        function getSelectedRangePixels(chart) {
            const area = chart && chart.chartArea;
            const xScale = chart && chart.scales && chart.scales.x;
            if (!area || !xScale) return null;

            if (selectedRange.dragActive && selectedRange.dragStartPx != null && selectedRange.dragCurrentPx != null) {
                return {
                    left: Math.max(area.left, Math.min(selectedRange.dragStartPx, selectedRange.dragCurrentPx)),
                    right: Math.min(area.right, Math.max(selectedRange.dragStartPx, selectedRange.dragCurrentPx)),
                    dragging: true
                };
            }

            if (selectedRange.startMs == null || selectedRange.endMs == null) return null;
            const left = xScale.getPixelForValue(selectedRange.startMs);
            const right = xScale.getPixelForValue(selectedRange.endMs);
            if (!Number.isFinite(left) || !Number.isFinite(right)) return null;
            if (right < area.left || left > area.right) return null;
            return {
                left: Math.max(area.left, Math.min(left, right)),
                right: Math.min(area.right, Math.max(left, right)),
                dragging: false
            };
        }

        function drawSelectedRangeOverlay(chart) {
            const selection = getSelectedRangePixels(chart);
            if (!selection) return;
            const width = selection.right - selection.left;
            if (width < 1) return;

            const { ctx, chartArea } = chart;
            ctx.save();
            ctx.fillStyle = selection.dragging ? 'rgba(52, 152, 219, 0.18)' : 'rgba(52, 152, 219, 0.13)';
            ctx.strokeStyle = selection.dragging ? 'rgba(116, 185, 255, 0.95)' : 'rgba(116, 185, 255, 0.75)';
            ctx.lineWidth = 1;
            ctx.fillRect(selection.left, chartArea.top, width, chartArea.bottom - chartArea.top);
            ctx.strokeRect(selection.left, chartArea.top, width, chartArea.bottom - chartArea.top);
            ctx.restore();
        }

        function clearRangeSelection() {
            rangeSummaryRequestId += 1;
            selectedRange = {
                startMs: null,
                endMs: null,
                dragStartPx: null,
                dragCurrentPx: null,
                dragActive: false,
                loading: false,
                error: '',
                summary: null,
                suppressNextClick: false
            };
            renderSelectedRangeSummary();
            if (powerChart) powerChart.draw();
        }

        function setSelectedRangeFromPixels(startPx, endPx) {
            const area = powerChart && powerChart.chartArea;
            const xScale = powerChart && powerChart.scales && powerChart.scales.x;
            if (!area || !xScale) return;
            if (Math.abs(endPx - startPx) < RANGE_SELECTION_MIN_PIXELS) return;

            const startMs = xScale.getValueForPixel(Math.min(startPx, endPx));
            const endMs = xScale.getValueForPixel(Math.max(startPx, endPx));
            if (!Number.isFinite(startMs) || !Number.isFinite(endMs) || endMs <= startMs) return;

            selectedRange.startMs = startMs;
            selectedRange.endMs = endMs;
            selectedRange.loading = true;
            selectedRange.error = '';
            selectedRange.summary = null;
            renderSelectedRangeSummary();
            loadSelectedRangeSummary();
            if (powerChart) powerChart.draw();
        }

        function loadSelectedRangeSummary() {
            if (selectedRange.startMs == null || selectedRange.endMs == null) return;
            const requestId = ++rangeSummaryRequestId;
            const startIso = new Date(selectedRange.startMs).toISOString();
            const endIso = new Date(selectedRange.endMs).toISOString();

            fetch(`/api/history/summary?start=${encodeURIComponent(startIso)}&end=${encodeURIComponent(endIso)}`)
                .then(response => response.json().then(payload => ({ ok: response.ok, payload })))
                .then(({ ok, payload }) => {
                    if (requestId !== rangeSummaryRequestId) return;
                    if (!ok) {
                        throw new Error(payload.error || 'Failed to summarize selected range');
                    }
                    selectedRange.loading = false;
                    selectedRange.error = '';
                    selectedRange.summary = payload;
                    renderSelectedRangeSummary();
                })
                .catch(error => {
                    if (requestId !== rangeSummaryRequestId) return;
                    selectedRange.loading = false;
                    selectedRange.summary = null;
                    selectedRange.error = error.message || 'Failed to summarize selected range';
                    renderSelectedRangeSummary();
                });
        }

        function renderSelectedRangeSummary() {
            const body = document.getElementById('rangeSummaryBody');
            const clearBtn = document.getElementById('clearRangeSelectionBtn');
            if (!body || !clearBtn) return;

            const hasSelection = selectedRange.startMs != null && selectedRange.endMs != null;
            clearBtn.style.display = hasSelection ? 'inline-flex' : 'none';

            if (!hasSelection) {
                body.className = 'range-summary-empty';
                body.innerHTML = 'Drag across the chart to measure energy and cost for any span. Click without dragging still adds a marker.';
                return;
            }

            const startLabel = formatChartTimestamp(new Date(selectedRange.startMs));
            const endLabel = formatChartTimestamp(new Date(selectedRange.endMs));

            if (selectedRange.loading) {
                body.className = 'range-summary-note';
                body.innerHTML = `<div class="range-summary-times">${startLabel}<br>${endLabel}</div>Calculating energy and cost for the selected range…`;
                return;
            }

            if (selectedRange.error) {
                body.className = 'range-summary-error';
                body.innerHTML = `<div class="range-summary-times">${startLabel}<br>${endLabel}</div>${selectedRange.error}`;
                return;
            }

            const summary = selectedRange.summary;
            if (!summary) {
                body.className = 'range-summary-empty';
                body.textContent = 'Select a range to see summary details.';
                return;
            }

            const spotCoverage = Number(summary.spot_price_coverage_pct || 0);
            const measuredCoverage = Number(summary.measured_coverage_pct || 0);
            const p1CounterCoverage = Number(summary.p1_counter_fill_coverage_pct || 0);
            const invoiceCoverage = Number(summary.invoice_estimate_coverage_pct || 0);
            const invoicePriceCoverage = Number(summary.invoice_price_coverage_pct || 0);
            const deltaCoverage = Number(summary.invoice_delta_coverage_pct || 0);
            const costLabel = spotCoverage >= 99.9 ? 'Spot Cost' : 'Est. Cost';
            let note = `Measured coverage ${measuredCoverage.toFixed(1)}%.`;
            if (p1CounterCoverage > 0.1) {
                note += ` P1 counter fill covered another ${p1CounterCoverage.toFixed(1)}% (${formatEnergyKwh(summary.p1_counter_fill_kwh)}).`;
            }
            if (invoiceCoverage > 0.1) {
                note += ` Invoice backfill covered another ${invoiceCoverage.toFixed(1)}% (${formatEnergyKwh(summary.invoice_estimate_kwh)}).`;
            }
            if (invoicePriceCoverage > 0.1) {
                note += ` Direct invoice pricing covered ${invoicePriceCoverage.toFixed(1)}% of imported energy.`;
            } else if (deltaCoverage > 0.1 && summary.price_delta_cents_per_kwh != null) {
                note += ` Cost used spot plus ${Number(summary.price_delta_cents_per_kwh).toFixed(2)} c/kWh invoice-calibrated delta for ${deltaCoverage.toFixed(1)}% of imported energy.`;
            } else if (spotCoverage >= 99.9) {
                note += ' Cost uses historical spot prices.';
            } else {
                note += ` Spot-priced ${spotCoverage.toFixed(1)}% of imported energy; the rest uses ${summary.fallback_price_cents_per_kwh.toFixed(2)} c/kWh.`;
            }
            if ((summary.export_energy_kwh || 0) > 0.01) {
                note += ` Exported ${summary.export_energy_kwh.toFixed(2)} kWh during the same span.`;
            }

            body.className = 'range-summary-note';
            body.innerHTML = `
                <div class="range-summary-times">${startLabel}<br>${endLabel}</div>
                <div class="range-summary-grid">
                    <div class="range-summary-stat">
                        <div class="range-summary-value">${formatRangeDuration(summary.duration_seconds)}</div>
                        <div class="range-summary-label">Duration</div>
                    </div>
                    <div class="range-summary-stat">
                        <div class="range-summary-value">${formatEnergyKwh(summary.import_energy_kwh)}</div>
                        <div class="range-summary-label">Energy</div>
                    </div>
                    <div class="range-summary-stat">
                        <div class="range-summary-value">${formatMoney(summary.estimated_cost_eur)}</div>
                        <div class="range-summary-label">${costLabel}</div>
                    </div>
                    <div class="range-summary-stat">
                        <div class="range-summary-value">${formatPowerValue(summary.max_power_w)}</div>
                        <div class="range-summary-label">Peak</div>
                    </div>
                </div>
                <div class="range-summary-note">${note}</div>
            `;
        }

        function attachRangeSelectionGesture(canvas) {
            let pointerState = null;

            const finishSelection = (event, cancelled = false) => {
                if (!pointerState) return;
                const rect = canvas.getBoundingClientRect();
                const endPx = clampSelectionPx(event ? (event.clientX - rect.left) : pointerState.startPx);
                const wasDragging = !!pointerState.dragging;
                selectedRange.dragActive = false;
                selectedRange.dragStartPx = null;
                selectedRange.dragCurrentPx = null;

                if (!cancelled && wasDragging) {
                    setSelectedRangeFromPixels(pointerState.startPx, endPx);
                    selectedRange.suppressNextClick = true;
                }

                pointerState = null;
                if (powerChart) powerChart.draw();
            };

            canvas.addEventListener('pointerdown', (event) => {
                if (event.button !== 0 || !powerChart || !powerChart.chartArea) return;
                const rect = canvas.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;
                const area = powerChart.chartArea;
                if (x < area.left || x > area.right || y < area.top || y > area.bottom) return;

                pointerState = {
                    id: event.pointerId,
                    startPx: clampSelectionPx(x),
                    startPy: y,
                    dragging: false
                };
                selectedRange.dragActive = true;
                selectedRange.dragStartPx = pointerState.startPx;
                selectedRange.dragCurrentPx = pointerState.startPx;
                canvas.setPointerCapture?.(event.pointerId);
            });

            canvas.addEventListener('pointermove', (event) => {
                if (!pointerState || event.pointerId !== pointerState.id) return;
                const rect = canvas.getBoundingClientRect();
                const x = clampSelectionPx(event.clientX - rect.left);
                const y = event.clientY - rect.top;
                const dx = x - pointerState.startPx;
                const dy = y - pointerState.startPy;

                if (!pointerState.dragging) {
                    if (Math.abs(dx) < RANGE_SELECTION_MIN_PIXELS) return;
                    if (Math.abs(dx) < Math.abs(dy)) return;
                    pointerState.dragging = true;
                }

                selectedRange.dragCurrentPx = x;
                if (powerChart) powerChart.draw();
                event.preventDefault();
            }, { passive: false });

            canvas.addEventListener('pointerup', (event) => finishSelection(event, false));
            canvas.addEventListener('pointercancel', (event) => finishSelection(event, true));
            canvas.addEventListener('pointerleave', (event) => {
                if (pointerState && pointerState.dragging) finishSelection(event, false);
            });
        }

                                    if (markerItem) {
                                        return formatChartTimestamp(markerItem.raw.marker.datetime || markerItem.raw.x);

                                    const targetMs = Number.isFinite(tooltipCursorMs)
                                        ? tooltipCursorMs
                                        : ((items[0].raw && pointTimeMs(items[0].raw)) || items[0].parsed.x);
                                    return formatChartTimestamp(new Date(targetMs));

                                    if (rows.length) return [];
                                    const rowIndex = context.raw && context.raw.tooltipRowIndex != null

                                        : context.dataIndex;

                                    const label = context.dataset && context.dataset.label;
                                    const ds = context.dataset || {};
                                    if (label === 'Markers' && context.raw && context.raw.marker) {

                                    if (rows.length) return [];
                                    const rowIndex = context.raw && context.raw.tooltipRowIndex != null
                                        ? context.raw.tooltipRowIndex
                                        : context.dataIndex;
                                    const row = rows[rowIndex];
                                    if (row) return tooltipAfterLabelForRow(row);
                                    if (context.dataset && context.dataset.tooltipCarrier) return '';
                                    const ds = context.dataset || {};
                                    if (ds.label === 'Markers' && context.raw && context.raw.marker) {
                                        const marker = context.raw.marker;
                                        return marker.description ? [`Notes: ${marker.description}`] : [];
                                    }
                                    if (ds.invoiceEstimateSeries && context.raw && context.raw.invoiceNumber) {
                                        const seller = context.raw.sellerName ? ` (${context.raw.sellerName})` : '';
                                        return `Estimated from invoice ${context.raw.invoiceNumber}${seller}`;
                                    }
                                    if (ds.ilpSeries && context.raw && context.raw.coveragePercent != null) {
                                        const suffix = context.raw.partial ? ' (partial hour)' : '';
                                        return `Coverage: ${context.raw.coveragePercent.toFixed(1)}%${suffix}`;
                                    }
                                    return '';
                                }
                            }

                    },
                    onHover: (event, activeElements) => {
                        const native = event && event.native;
                        if (native && (native.type === 'mouseout' || native.type === 'mouseleave')) {
                            hideCompleteTooltip();
                        } else if (native && Number.isFinite(native.offsetX) && Number.isFinite(native.offsetY)) {
                            updateCompleteTooltipAt(native.offsetX, native.offsetY);
                        }
                        ctx.canvas.style.cursor = activeElements.length > 0 ? 'pointer' : 'crosshair';
                    },
                    onClick: (event) => {
                        if (selectedRange.suppressNextClick) {
                            selectedRange.suppressNextClick = false;
                            return;
                        }
                        const points = powerChart.getElementsAtEventForMode(event, 'nearest', { intersect: false }, true);
                        if (points.length > 0) {
                            const point = points[0];
                            const ds = powerChart.data.datasets[point.datasetIndex];
                            // Only allow marker placement on the power line, not overlays
                            if (!ds || (!ds.mainPowerSeries && !ds.invoiceEstimateSeries && ds.label !== 'Total Power (W)')) return;
                            const timestamp = ds.data[point.index].x;
                            selectedTimestamp = new Date(timestamp).getTime() / 1000;
                            openMarkerModal();
                        }
                    }
                }
            });
            attachPanGesture(ctx.canvas);
            attachRangeSelectionGesture(ctx.canvas);
            attachCompleteTooltipGesture(ctx.canvas);
        }
        
        // --- Two-finger horizontal pan -----------------------------------
        function resolveCurrentWindowMs() {
            if (viewWindowMs) return { ...viewWindowMs };
            const now = Date.now();
            if (currentTimeRange.hours) {
                return { start: now - currentTimeRange.hours * 3600 * 1000, end: now };
            }
            if (currentTimeRange.start && currentTimeRange.end) {
                return {
                    start: new Date(currentTimeRange.start).getTime(),
                    end: new Date(currentTimeRange.end).getTime()
                };
            }
            return null;
        }
        
        const MIN_SPAN_MS = 60 * 1000;                  // 1 minute
        const MAX_SPAN_MS = 90 * 24 * 3600 * 1000;      // 90 days
        
        function commitWindow(win) {
            viewWindowMs = win;
            powerChart.options.scales.x.min = win.start;
            powerChart.options.scales.x.max = win.end;
            powerChart.update('none');
            
            document.querySelectorAll('.quick-period').forEach(b => b.classList.remove('active'));
            document.getElementById('startTime').value = formatDateTimeLocal(new Date(win.start));
            document.getElementById('endTime').value = formatDateTimeLocal(new Date(win.end));
            currentTimeRange = {
                start: new Date(win.start).toISOString(),
                end: new Date(win.end).toISOString()
            };
            clearRangeSelection();
            
            clearTimeout(panFetchTimer);
            panFetchTimer = setTimeout(() => { loadData(); }, 200);
        }
        
        function applyPan(deltaPx) {
            const win = resolveCurrentWindowMs();
            if (!win) return;
            const area = powerChart.chartArea;
            if (!area) return;
            const width = area.right - area.left;
            if (width <= 0) return;
            const span = win.end - win.start;
            const shift = deltaPx * (span / width);
            win.start += shift;
            win.end += shift;
            commitWindow(win);
        }
        
        function applyZoom(deltaY, cursorOffsetX) {
            const win = resolveCurrentWindowMs();
            if (!win) return;
            const area = powerChart.chartArea;
            if (!area) return;
            const width = area.right - area.left;
            if (width <= 0) return;
            
            // Pinch out (fingers spread) → deltaY<0 → zoom in (smaller span)
            const factor = Math.exp(deltaY * 0.01);
            const span = win.end - win.start;
            let newSpan = span * factor;
            newSpan = Math.max(MIN_SPAN_MS, Math.min(MAX_SPAN_MS, newSpan));
            if (newSpan === span) return;
            
            const cursorPx = Math.max(0, Math.min(width, cursorOffsetX - area.left));
            const frac = cursorPx / width;
            const cursorTime = win.start + span * frac;
            win.start = cursorTime - newSpan * frac;
            win.end = cursorTime + newSpan * (1 - frac);
            commitWindow(win);
        }
        
        function attachPanGesture(canvas) {
            canvas.addEventListener('wheel', (e) => {
                // Pinch-to-zoom: macOS trackpad pinch reports wheel+ctrlKey.
                // Ctrl/Cmd+wheel on mouse also zooms.
                if (e.ctrlKey || e.metaKey) {
                    if (!e.deltaY) return;
                    e.preventDefault();
                    applyZoom(e.deltaY, e.offsetX);
                    return;
                }
                
                let dx = 0;
                if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
                    dx = e.deltaX;             // trackpad two-finger horizontal
                } else if (e.shiftKey && e.deltaY) {
                    dx = e.deltaY;             // shift+wheel fallback for mouse
                } else {
                    return;                    // let vertical scroll pass through
                }
                if (dx === 0) return;
                e.preventDefault();
                applyPan(dx);
            }, { passive: false });
            
            // Touch pinch (mobile / touch-screen laptops)
            let pinchState = null;
            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    const rect = canvas.getBoundingClientRect();
                    const [a, b] = e.touches;
                    pinchState = {
                        dist: Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY),
                        centerX: ((a.clientX + b.clientX) / 2) - rect.left
                    };
                    e.preventDefault();
                }
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                if (pinchState && e.touches.length === 2) {
                    const [a, b] = e.touches;
                    const dist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
                    if (dist > 0 && pinchState.dist > 0) {
                        // Convert ratio to equivalent wheel deltaY (negative = zoom in)
                        const deltaY = -Math.log(dist / pinchState.dist) * 100;
                        applyZoom(deltaY, pinchState.centerX);
                        pinchState.dist = dist;
                    }
                    e.preventDefault();
                }
            }, { passive: false });
            canvas.addEventListener('touchend', () => { pinchState = null; });
            canvas.addEventListener('touchcancel', () => { pinchState = null; });
        }

        function updateCompleteTooltipAt(x, y) {
            if (!powerChart || selectedRange.dragActive) return;
            const area = powerChart.chartArea;
            const xScale = powerChart.scales && powerChart.scales.x;
            if (!area || !xScale) return;

            const edgeTolerance = 2;
            if (
                x < area.left - edgeTolerance ||
                x > area.right + edgeTolerance ||
                y < area.top - edgeTolerance ||
                y > area.bottom + edgeTolerance
            ) {
                hideCompleteTooltip();
                return;
            }

            const clampedX = Math.max(area.left, Math.min(area.right, x));
            const clampedY = Math.max(area.top, Math.min(area.bottom, y));
            syncTooltipCarrier(xScale.getValueForPixel(clampedX));
            const rows = completeTooltipRows();
            setHoveredDatasetIndex(findHoveredDatasetIndex(rows, clampedY));
            powerChart.update('none');
            if (!rows.length) {
                hideCompleteTooltip();
                return;
            }

            powerChart.draw();
            renderCompleteTooltip(clampedX, clampedY);
        }

        function attachCompleteTooltipGesture(canvas) {
            canvas.addEventListener('mousemove', (event) => {
                const rect = canvas.getBoundingClientRect();
                updateCompleteTooltipAt(event.clientX - rect.left, event.clientY - rect.top);
            });

            const clearHover = () => {
                hideCompleteTooltip();
            };
            canvas.addEventListener('mouseleave', clearHover);
            canvas.addEventListener('mouseout', clearHover);
            window.addEventListener('mousemove', (event) => {
                const rect = canvas.getBoundingClientRect();
                if (
                    event.clientX < rect.left ||
                    event.clientX > rect.right ||
                    event.clientY < rect.top ||
                    event.clientY > rect.bottom
                ) {
                    hideCompleteTooltip();
                }
            }, { passive: true });
        }
        
        function resetPanState() {
            viewWindowMs = null;
            if (powerChart && powerChart.options && powerChart.options.scales && powerChart.options.scales.x) {
                delete powerChart.options.scales.x.min;
                delete powerChart.options.scales.x.max;
            }
        }
        
        function setupTimeControls() {
            // Set default times
            const now = new Date();
            const twentyFourHoursAgo = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            
            document.getElementById('endTime').value = formatDateTimeLocal(now);
            document.getElementById('startTime').value = formatDateTimeLocal(twentyFourHoursAgo);
            
            // Quick period buttons
            document.querySelectorAll('.quick-period').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.quick-period').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    const hours = parseInt(this.dataset.hours);
                    currentTimeRange = { hours: hours };
                    resetPanState();
                    clearRangeSelection();
                    loadData();
                });
            });
        }
        
        function formatDateTimeLocal(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }
        
        function loadData() {
            let url;
            if (currentTimeRange.hours) {
                url = `/api/history/${currentTimeRange.hours}`;
            } else if (currentTimeRange.start && currentTimeRange.end) {
                url = `/api/history/range?start=${currentTimeRange.start}&end=${currentTimeRange.end}`;
            } else {
                return;
            }
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    updateChart(data);
                    loadMarkers();
                    if (showSpotPrice) loadSpotPrice();
                    if (showPlugs) loadPlugsBreakdown();
                    if (showIlpPower) loadIlpPowerSeries();
                    else {
                        currentIlpPowerSeries = [];
                        renderIlpPowerSeries();
                    }
                })
                .catch(error => console.error('Error loading data:', error));
        }

        function togglePlugs() {
            showPlugs = !showPlugs;
            localStorage.setItem('showPlugs', showPlugs ? '1' : '0');
            updatePlugsButton();
            if (showPlugs) {
                loadPlugsBreakdown();
            } else {
                currentBreakdown = null;
                renderPlugsStack();
            }
        }

        function updatePlugsButton() {
            const btn = document.getElementById('plugsBtn');
            if (!btn) return;
            btn.classList.toggle('btn-primary', showPlugs);
            btn.classList.toggle('btn-secondary', !showPlugs);
        }

        function toggleIlpPower() {

            localStorage.setItem('showIlpPower', showIlpPower ? '1' : '0');
            updateIlpPowerButton();
            if (showIlpPower) {
                loadIlpPowerSeries();
            } else {

                renderIlpPowerSeries();

        function updateIlpPowerButton() {
            const btn = document.getElementById('ilpPowerBtn');
            if (!btn) return;
            btn.classList.toggle('btn-primary', showIlpPower);
            btn.classList.toggle('btn-secondary', !showIlpPower);
        }

        function loadPlugsBreakdown() {
            if (!showPlugs) return;
            let url;
            if (currentTimeRange.start && currentTimeRange.end) {
                url = `/api/kasa/breakdown/range?start=${encodeURIComponent(currentTimeRange.start)}&end=${encodeURIComponent(currentTimeRange.end)}`;
            } else if (currentTimeRange.hours) {
                url = `/api/kasa/breakdown/${currentTimeRange.hours}`;
            } else {
                return;
            }
            fetch(url)
                .then(r => r.json())
                .then(payload => {
                    currentBreakdown = payload && payload.times ? payload : null;
                    renderPlugsStack();
                })
                .catch(err => {
                    console.error('Plug breakdown fetch failed', err);
                    currentBreakdown = null;
                    renderPlugsStack();
                });
        }

        function renderPlugsStack() {
            // Wipe existing plug / unaccounted datasets
            powerChart.data.datasets = powerChart.data.datasets.filter(
                d => d.stack !== PLUG_STACK_ID
            );
            powerChart.options.scales.y.stacked = !!showPlugs;

            // Put the main P1 line in its own stack group so it doesn't
            // add on top of the consumption stack; without a unique stack
            // key Chart.js would merge it with the breakdown.
            const powerDs = powerChart.data.datasets.find(d => d.label === 'Total Power (W)');
            if (powerDs) {
                if (showPlugs) {
                    powerDs.stack = 'p1_total';
                    powerDs.fill = false;
                    powerDs.borderWidth = 2.5;
                    powerDs.order = 0;
                } else {
                    delete powerDs.stack;
                    powerDs.fill = true;
                    powerDs.borderWidth = 2;
                    delete powerDs.order;
                }
            }

            if (!showPlugs || !currentBreakdown) {
                powerChart.update('none');
                return;
            }

            const times = currentBreakdown.times.map(t => new Date(t));
            const plugs = currentBreakdown.plugs || [];
            const unaccounted = currentBreakdown.unaccounted || [];

            plugs.forEach((p, idx) => {
                const color = PLUG_COLORS[idx % PLUG_COLORS.length];
                powerChart.data.datasets.push({
                    label: p.alias || p.mac,
                    data: p.values.map((v, i) => ({ x: times[i], y: v })),
                    borderColor: color,
                    backgroundColor: hexToRgba(color, 0.45),
                    borderWidth: 1,
                    pointRadius: 0,
                    tension: 0.3,
                    fill: true,
                    stack: PLUG_STACK_ID,
                    order: 10 + idx,
                });
            });

            if (unaccounted.length) {
                powerChart.data.datasets.push({
                    label: UNACCOUNTED_LABEL,
                    data: unaccounted.map((v, i) => ({ x: times[i], y: v })),
                    borderColor: '#7f8c8d',
                    backgroundColor: 'rgba(127, 140, 141, 0.3)',
                    borderWidth: 1,
                    pointRadius: 0,
                    tension: 0.3,
                    fill: true,
                    stack: PLUG_STACK_ID,
                    order: 50,
                });
            }

            powerChart.update('none');
        }

        function loadIlpPowerSeries() {
            if (!showIlpPower) return;
            const win = resolveWindowIso();
            if (!win) return;
            fetch(`/api/melcloud/power-series?start=${encodeURIComponent(win.start)}&end=${encodeURIComponent(win.end)}`)
                .then(r => r.json())
                .then(payload => {
                    currentIlpPowerSeries = (payload && payload.series) || [];
                    renderIlpPowerSeries();
                })
                .catch(err => {
                    console.error('ILP power fetch failed', err);
                    currentIlpPowerSeries = [];
                    renderIlpPowerSeries();
                });
        }

        function renderIlpPowerSeries() {
            powerChart.data.datasets = powerChart.data.datasets.filter(d => !d.ilpSeries);

            if (!showIlpPower || !currentIlpPowerSeries.length) {
                powerChart.update('none');
                return;
            }

            currentIlpPowerSeries.forEach((series, idx) => {
                const color = series.included_in_p1 === false ? '#ff7a59' : '#16a085';
                const points = buildHourlyIlpPoints(series.points || []);
                if (!points.length) return;

                powerChart.data.datasets.push({
                    label: `${ILP_DATASET_PREFIX} ${series.name} (${series.included_in_p1 === false ? 'outside P1' : 'in P1'})`,
                    data: points,
                    ilpSeries: true,
                    borderColor: color,
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    borderDash: series.included_in_p1 === false ? [8, 4] : [4, 4],
                    stepped: 'after',
                    fill: false,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    tension: 0,
                    order: 6 + idx,
                });
            });

            powerChart.update('none');
        }

        function buildHourlyIlpPoints(points) {
            if (!points.length) return [];
            const series = points.map(point => ({
                x: new Date(point.start),
                y: point.avg_power_w,
                coveragePercent: point.coverage_percent,
                partial: point.partial
            }));
            const last = points[points.length - 1];
            series.push({
                x: new Date(last.end),
                y: last.avg_power_w,
                coveragePercent: last.coverage_percent,
                partial: last.partial
            });
            return series;
        }

        function hexToRgba(hex, alpha) {
            const h = hex.replace('#', '');
            const r = parseInt(h.substring(0, 2), 16);
            const g = parseInt(h.substring(2, 4), 16);
            const b = parseInt(h.substring(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function resolveWindowIso() {
            if (currentTimeRange.start && currentTimeRange.end) {
                return { start: currentTimeRange.start, end: currentTimeRange.end };
            }
            if (currentTimeRange.hours) {
                const now = new Date();
                const start = new Date(now.getTime() - currentTimeRange.hours * 3600 * 1000);
                return { start: start.toISOString(), end: now.toISOString() };
            }
            return null;
        }

        function toggleSpotPrice() {
            showSpotPrice = !showSpotPrice;
            localStorage.setItem('showSpotPrice', showSpotPrice ? '1' : '0');
            updateSpotPriceButton();
            if (showSpotPrice) {

            } else {
                currentSpotSeries = [];
                renderSpotPrice();
            }

        function updateSpotPriceButton() {
